<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Here Now - Refresh to Discover</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="grain-overlay"></div>

    <main class="gallery">
        <!-- Archive link positioned above photo, left-aligned -->
        <a href="archive.html" class="archive-link-top">Archive</a>

        <div class="frame-container">
            <div class="photo-frame" id="photo-frame">
                <img id="random-photo" src="" alt="">
            </div>
        </div>

        <div class="photo-info">
            <div class="photo-meta">
                <span id="series-name" class="series-name"></span>
                <span id="photo-title" class="photo-title"></span>
            </div>
            <div class="photo-credit">
                <span class="copyright">©</span>
                <a id="photographer-link" href="#" target="_blank" class="photographer-name"></a>
            </div>
        </div>
    </main>

    <script src="data/photographers.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
